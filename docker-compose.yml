services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: tokenflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/tokenflow
      SECRET_KEY: dev-secret
      FRONTEND_ORIGINS: http://localhost:5173
      TOKENFLOW_STORAGE_DIR: /app/storage
    ports:
      - "8000:8000"
    volumes:
      - ./backend/storage:/app/storage

volumes:
  pg_data:
