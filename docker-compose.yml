services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: tokenflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/tokenflow
      SECRET_KEY: dev-secret
      FRONTEND_ORIGINS: http://localhost:5173
      TOKENFLOW_STORAGE_DIR: /app/storage
      TOKENFLOW_MODELS_DIR: /app/models
      TOKENFLOW_RUNTIME_TIMEOUT_SECONDS: 20
      TOKENFLOW_RUNTIME_MAX_CONCURRENCY: 2
      TOKENFLOW_RUNTIME_MODEL_BACKEND: llama-cpp-python
      TOKENFLOW_RAG_VECTOR_DIM: 256
      TOKENFLOW_RAG_CHUNK_SIZE: 700
      TOKENFLOW_RAG_CHUNK_OVERLAP: 120
      TOKENFLOW_RAG_DEFAULT_TOP_K: 5
      TOKENFLOW_RAG_CACHE_TTL_SECONDS: 900
    ports:
      - "8000:8000"
    volumes:
      - ./backend/storage:/app/storage
      - ./models:/app/models:ro

volumes:
  pg_data:
